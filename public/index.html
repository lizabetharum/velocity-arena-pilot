<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/images/first.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Arena — Today</title>
<link rel="stylesheet" href="/style.css">
<style>
.hero{background:var(--navy2);border-left:0.375rem solid var(--cyan);border-radius:0 0.75rem 0.75rem 0;padding:1.75rem 2rem;margin-bottom:1.75rem;}
.hero-meta{font-size:0.75rem;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.1em;margin-bottom:0.5rem;}
.hero-theme{font-size:1.75rem;font-weight:800;color:var(--white);line-height:1.2;margin-bottom:0.75rem;}
.hero-week{font-size:0.9375rem;color:var(--slate);margin-bottom:1.25rem;}
.hero-actions{display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;}

.week-pip-row{display:grid;grid-template-columns:repeat(5,1fr);gap:0.625rem;margin-bottom:1.75rem;}
.pip{background:var(--card-bg);border:0.09375rem solid var(--card-border);border-radius:0.625rem;padding:0.875rem 0.5rem;text-align:center;text-decoration:none;display:block;transition:border-color .15s;}
.pip:hover{border-color:var(--cyan);}
.pip.today{border-color:var(--cyan);background:var(--navy3);}
.pip.past{opacity:.4;}
.pip-num{font-size:1.25rem;font-weight:800;color:var(--white);}
.pip.today .pip-num{color:var(--cyan);}
.pip-day{font-size:0.6875rem;color:var(--slate);font-weight:500;margin-top:0.25rem;}

.acts-list{display:flex;flex-direction:column;gap:0.5rem;}
.act-row{background:var(--card-bg);border:0.0625rem solid var(--card-border);border-radius:0.5rem;padding:0.875rem 1rem;display:flex;gap:0.875rem;align-items:flex-start;}
.act-mins{font-size:0.75rem;font-weight:700;color:var(--cyan);min-width:2.5rem;flex-shrink:0;padding-top:0.125rem;}
.act-name{font-size:0.9375rem;font-weight:700;color:var(--white);}
.act-block{font-size:0.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:0.25rem;}
.block-hook{color:#FFAA44;}
.block-challenge{color:#66DD88;}
.block-matchbuild{color:#BB88FF;}
.block-openlab{color:#66AAFF;}
.block-ends{color:#FF88BB;}
.block-other{color:var(--slate);}

.ends-card{background:var(--navy2);border:0.0625rem solid var(--border);border-radius:0.75rem;padding:1.25rem 1.5rem;margin-top:1rem;}
.ends-label{font-size:0.75rem;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.1em;margin-bottom:0.5rem;}
.ends-text{font-size:0.9375rem;color:var(--white);line-height:1.65;font-style:italic;}

.offday{background:var(--navy2);border:0.0625rem solid var(--border);border-radius:0.75rem;padding:2.5rem 2rem;text-align:center;margin-bottom:1.5rem;}
.offday-icon{font-size:2.5rem;margin-bottom:1rem;}
.offday-title{font-size:1.375rem;font-weight:800;color:var(--white);margin-bottom:0.5rem;}
.offday-sub{font-size:1rem;color:var(--slate);line-height:1.6;}
</style>
</head>
<body>
<div id="site-header"></div>

<main class="page-body" id="main"></main>

<script src="/config.js"></script>
<script src="/site.js"></script>
<script src="/days.js"></script>
<script>
renderHeader('today');

// ── Date calculation ──────────────────────────────────────────────────────
function getCampInfo() {
  const campDates = buildCampDates();

  const now = new Date();
  const todayStr = now.toLocaleDateString('en-CA', { timeZone: CONFIG.timezone });
  const today = new Date(todayStr + 'T00:00:00');

  for (let i = 0; i < campDates.length; i++) {
    const cdStr = campDates[i].toISOString().slice(0, 10);
    if (cdStr === todayStr) return { dayNum: i + 1, campDates, todayStr };
  }

  // Check if today is a holiday during camp range
  const holidaySet = new Set(CONFIG.holidays || []);
  if (today >= campDates[0] && today <= campDates[campDates.length - 1] && holidaySet.has(todayStr)) {
    return { dayNum: 'weekend', campDates, todayStr };
  }

  if (today < campDates[0]) return { dayNum: 'before', campDates, todayStr };
  if (today > campDates[campDates.length - 1]) return { dayNum: 'after', campDates, todayStr };
  return { dayNum: 'weekend', campDates, todayStr };
}

// ── Block helpers ────────────────────────────────────────────────────────
function blockClass(block) {
  const b = (block || '').toLowerCase();
  if (b.includes('hook') || b.includes('ice breaker')) return 'block-hook';
  if (b.includes('challenge')) return 'block-challenge';
  if (b.includes('match')) return 'block-matchbuild';
  if (b.includes('open lab') || b.includes('open-lab')) return 'block-openlab';
  if (b.includes('ends')) return 'block-ends';
  return 'block-other';
}
function blockLabel(block) {
  const b = (block || '').toLowerCase();
  if (b.includes('hook') || b.includes('ice breaker')) return 'Ice Breaker';
  if (b.includes('challenge')) return 'Challenge Block';
  if (b.includes('match')) return 'Match-Build-Make';
  if (b.includes('open lab') || b.includes('open-lab')) return 'Open Lab';
  if (b.includes('ends')) return 'ENDS';
  return block || '';
}

// ── Render ───────────────────────────────────────────────────────────────
const main = document.getElementById('main');
const { dayNum, campDates } = getCampInfo();

if (dayNum === 'before') {
  const d = DAYS[0];
  main.innerHTML = `
    <div class="offday">
      <div class="offday-title">Camp starts on Day 1</div>
      <div class="offday-sub">${d.theme}</div>
    </div>
    <div class="section-label">Browse the full schedule</div>
    ${buildWeekGrid(null)}`;

} else if (dayNum === 'after') {
  main.innerHTML = `
    <div class="offday">
      <div class="offday-title">Camp has ended</div>
      <div class="offday-sub">Thanks for a great four weeks. Browse the schedule below.</div>
    </div>
    <div class="section-label">Full schedule</div>
    ${buildWeekGrid(null)}`;

} else if (dayNum === 'weekend') {
  main.innerHTML = `
    <div class="offday">
      <div class="offday-title">No camp today</div>
      <div class="offday-sub">See you Monday. Browse upcoming days below.</div>
    </div>
    <div class="section-label">Full schedule</div>
    ${buildWeekGrid(null)}`;

} else {
  const day = DAYS.find(d => d.day === dayNum);
  const weekDays = DAYS.filter(d => d.week === day.week);

  const actRows = (day.activities || []).map(a => `
    <div class="act-row">
      <div class="act-mins">${a.mins}m</div>
      <div>
        <div class="act-name">${a.name}</div>
        <div class="act-block ${blockClass(a.block)}">${blockLabel(a.block)}</div>
      </div>
    </div>`).join('');

  const endsHtml = day.ends ? `
    <div class="ends-card">
      <div class="ends-label">ENDS closing ritual</div>
      <div class="ends-text">${day.ends}</div>
    </div>` : '';

  const pips = weekDays.map(d => `
    <a class="pip${d.day === dayNum ? ' today' : d.day < dayNum ? ' past' : ''}"
       href="/day.html?day=${d.day}">
      <div class="pip-num">${d.day}</div>
      <div class="pip-day">${campDayWeekday(campDates, d.day).slice(0,3)}</div>
    </a>`).join('');

  main.innerHTML = `
    <div class="hero">
      <div class="hero-meta">Week ${day.week} · Day ${day.day} · ${realWeekday(campDates, day.day - 1)}</div>
      <div class="hero-theme">${day.theme}</div>
      <div class="hero-week">${day.weekName}</div>
      <div class="hero-actions">
        <a class="btn-primary" href="/day.html?day=${day.day}">View today's plan</a>
        <a class="btn-outline" href="/tools.html">Tools</a>
      </div>
    </div>

    <div class="section-label">This week — Week ${day.week}</div>
    <div class="week-pip-row">${pips}</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;">
      <div>
        <div class="section-label">Today's activities</div>
        <div class="acts-list">${actRows}</div>
        ${endsHtml}
      </div>
      <div>
        <div class="section-label">Full schedule</div>
        ${buildWeekGrid(dayNum)}
      </div>
    </div>`;
}

function buildWeekGrid(currentDay) {
  const weeks = [
    { num: 1, label: 'Week 1 · Play Lab + Boot Camp' },
    { num: 2, label: 'Week 2 · Season 1' },
    { num: 3, label: 'Week 3 · Season 2 + Commissioner' },
    { num: 4, label: 'Week 4 · Championship' },
  ];
  return weeks.map(w => {
    const days = DAYS.filter(d => d.week === w.num);
    const cards = days.map(d => {
      const isToday = d.day === currentDay;
      const isPast = currentDay && d.day < currentDay;
      return `<a href="/day.html?day=${d.day}"
        style="display:block;background:var(--card-bg);border:0.09375rem solid ${isToday ? 'var(--cyan)' : 'var(--card-border)'};
               border-radius:0.5rem;padding:0.625rem 0.5rem;text-align:center;text-decoration:none;
               opacity:${isPast ? '.4' : '1'};transition:border-color .15s;"
        onmouseover="this.style.borderColor='var(--cyan)'"
        onmouseout="this.style.borderColor='${isToday ? 'var(--cyan)' : 'var(--card-border)'}'">
        <div style="font-size:1rem;font-weight:800;color:${isToday ? 'var(--cyan)' : 'var(--white)'};">${d.day}</div>
        <div style="font-size:0.625rem;color:var(--slate);font-weight:500;margin-top:0.125rem;">${campDayWeekday(campDates, d.day).slice(0,3)}</div>
      </a>`;
    }).join('');
    return `
      <div style="margin-bottom:1rem;">
        <div style="font-size:0.75rem;font-weight:700;color:var(--slate);text-transform:uppercase;
                    letter-spacing:.06em;margin-bottom:0.5rem;">${w.label}</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0.375rem;">${cards}</div>
      </div>`;
  }).join('');
}
</script>
</body>
</html>
